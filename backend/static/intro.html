<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - AI Media Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        // Apply theme immediately to prevent layout shift
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        .intro-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .intro-title {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: var(--header-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInTranslate 1s forwards 0.5s;
        }

        .intro-subtitle {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            max-width: 600px;
            opacity: 0;
            animation: fadeInTranslate 1s forwards 0.8s;
        }

        .intro-actions {
            opacity: 0;
            animation: fadeInTranslate 1s forwards 1.1s;
        }

        .btn-get-started {
            padding: 1.2rem 3rem;
            font-size: 1.2rem;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.4);
        }

        @keyframes fadeInTranslate {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Flying robot background decorations (not the tracked one) */
        .bg-robots {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .bg-robot-mini {
            position: absolute;
            opacity: 0.3;
            transform: scale(0.5);
        }

        .bg-robot-mini:nth-child(1) { animation: robotFlyAround 18s infinite ease-in-out; top: 10%; left: 5%; }
        .bg-robot-mini:nth-child(2) { animation: robotFlyAround 24s infinite ease-in-out reverse; top: 60%; left: 70%; animation-delay: -8s; }
        .bg-robot-mini:nth-child(3) { animation: robotFlyAround 20s infinite ease-in-out; top: 80%; left: 20%; animation-delay: -5s; }

        /* Main trackable robot - now flies freely */
        .flying-robot-free {
            position: fixed;
            z-index: 50;
            pointer-events: none;
            transition: none; /* pure JS animation */
            filter: drop-shadow(0 0 20px rgba(138, 43, 226, 0.6));
        }
    </style>
</head>

<body>
    <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Light/Dark Mode">
        <span class="sun-icon">☀️</span>
        <span class="moon-icon">🌙</span>
    </button>

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>


    <!-- Flying Robot (JS physics controlled) -->
    <div class="robot flying-robot-free" id="intro-robot" style="left:10%;top:15%">
        <div class="robot-head">
            <div class="robot-face">
                <div class="robot-eye left"><div class="eye-pupil"></div></div>
                <div class="robot-eye right"><div class="eye-pupil"></div></div>
            </div>
        </div>
        <div class="robot-body">
            <div class="robot-chest"></div>
            <div class="robot-arm left"></div>
            <div class="robot-arm right"></div>
        </div>
    </div>

    <main class="intro-container">
        <h1 class="intro-title">AI Media Detector</h1>
        <p class="intro-subtitle">The most advanced platform to detect Deepfakes, AI Voice, and Generated Visuals across all social media platforms.</p>
        
        <div class="intro-actions">
            <a href="login.html" class="btn btn-get-started">Explore Portal</a>
        </div>
    </main>

    <script>
        // Theme toggle logic for intro page
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                const html = document.documentElement;
                const currentTheme = html.getAttribute('data-theme') || 'light';
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                html.classList.add('theme-transition');
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                setTimeout(() => html.classList.remove('theme-transition'), 500);
            });
        }

        // === Flying Robot Physics Engine ===
        const robot = document.getElementById('intro-robot');
        const pupils = robot ? robot.querySelectorAll('.eye-pupil') : [];

        let rx = window.innerWidth * 0.1;
        let ry = window.innerHeight * 0.15;
        const robotW = 200, robotH = 230;

        // Speed: pixels per frame at 60fps
        let vx = 2.8;
        let vy = 2.2;
        let angle = 0; // tilt

        // Mouse position for eye tracking
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

        function updateRobotEyes() {
            if (!robot || pupils.length === 0) return;
            const eyes = robot.querySelectorAll('.robot-eye');
            eyes.forEach((eye, i) => {
                const rect = eye.getBoundingClientRect();
                if (rect.width === 0) return;
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const dx = mouseX - cx;
                const dy = mouseY - cy;
                const ang = Math.atan2(dy, dx);
                const dist = Math.min(Math.hypot(dx, dy), 8);
                pupils[i].style.transform = `translate(calc(-50% + ${Math.cos(ang)*dist}px), calc(-50% + ${Math.sin(ang)*dist}px))`;
            });
        }

        function fly() {
            rx += vx;
            ry += vy;

            const maxX = window.innerWidth - robotW;
            const maxY = window.innerHeight - robotH;

            // Bounce off walls (slow and smooth)
            if (rx <= 0)   { rx = 0;    vx = Math.abs(vx) + (Math.random() * 0.2); }
            if (rx >= maxX){ rx = maxX; vx = -(Math.abs(vx) + (Math.random() * 0.2)); }
            if (ry <= 0)   { ry = 0;    vy = Math.abs(vy) + (Math.random() * 0.2); }
            if (ry >= maxY){ ry = maxY; vy = -(Math.abs(vy) + (Math.random() * 0.2)); }

            // Clamp speed so it stays gentle
            const maxSpeed = 2.5;
            vx = Math.max(-maxSpeed, Math.min(maxSpeed, vx));
            vy = Math.max(-maxSpeed, Math.min(maxSpeed, vy));

            // Slight tilt based on horizontal velocity
            angle = vx * 5;

            robot.style.left = rx + 'px';
            robot.style.top  = ry + 'px';
            robot.style.transform = `rotate(${angle}deg)`;

            updateRobotEyes();
            requestAnimationFrame(fly);
        }

        // Start flying after a short delay so the page loads first
        setTimeout(() => requestAnimationFrame(fly), 500);
    </script>
</body>

</html>
