<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AI Media Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_v2.css">
    <script>
        // Force dark theme on admin panel
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
    </script>
    <style>
        /* Admin panel ALWAYS dark, regardless of light/dark toggle */
        html[data-theme="light"] body,
        html[data-theme="dark"] body,
        body {
            background: #000000 !important;
            color: #ffffff !important;
        }

        html[data-theme="light"] .admin-panel-glass,
        html[data-theme="dark"] .admin-panel-glass {
            background: rgba(255,255,255,0.04) !important;
            border-color: rgba(255,255,255,0.08) !important;
        }

        html[data-theme="light"] .stat-card,
        html[data-theme="dark"] .stat-card {
            background: rgba(255,255,255,0.05) !important;
            border-color: rgba(255,255,255,0.08) !important;
            color: #ffffff !important;
        }

        html[data-theme="light"] header h1,
        html[data-theme="dark"] header h1 {
            -webkit-text-fill-color: transparent !important;
        }

        /* Override glass-panel for light mode on admin */
        html[data-theme="light"] .admin-panel-glass h3 {
            color: #ffffff !important;
        }

        html[data-theme="light"] .robot-head,
        html[data-theme="light"] .robot-body {
            border-color: rgba(255,255,255,0.15) !important;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            gap: 2rem;
            align-items: flex-start;
        }

        .admin-sidebar {
            width: 260px;
            flex-shrink: 0;
            position: sticky;
            top: 2rem;
        }

        .admin-main {
            flex: 1;
        }

        .admin-header {
            margin-bottom: 2rem;
        }

        .admin-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #bc13fe, #8a2be2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }

        .admin-header p {
            color: #a09eb0;
            font-size: 0.95rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #8a2be2;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.2);
            transform: translateY(-2px);
        }

        .stat-card .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #bc13fe;
        }

        .stat-card .stat-label {
            font-size: 0.85rem;
            color: #a09eb0;
            margin-top: 0.3rem;
        }

        .admin-panel-glass {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .admin-panel-glass h3 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem;
            background: rgba(0, 230, 118, 0.08);
            border: 1px solid rgba(0, 230, 118, 0.25);
            border-radius: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00e676;
            box-shadow: 0 0 10px #00e676;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-indicator span {
            color: #00e676;
            font-weight: 600;
        }

        .robot-sidebar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .robot-sidebar-label {
            color: #a09eb0;
            font-size: 0.8rem;
            text-align: center;
            opacity: 0.7;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: rgba(138, 43, 226, 0.15);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 12px;
            color: #bc13fe;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            justify-content: center;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(138, 43, 226, 0.3);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
                padding: 1rem;
            }
            .admin-sidebar {
                width: 100%;
                position: static;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Light/Dark Mode">
        <span class="sun-icon">☀️</span>
        <span class="moon-icon">🌙</span>
    </button>

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <div class="admin-layout">

        <!-- Sidebar with Robot -->
        <aside class="admin-sidebar">
            <div class="admin-panel-glass robot-sidebar-container">
                <div class="robot" id="admin-robot">
                    <div class="robot-head">
                        <div class="robot-face">
                            <div class="robot-eye left">
                                <div class="eye-pupil"></div>
                            </div>
                            <div class="robot-eye right">
                                <div class="eye-pupil"></div>
                            </div>
                        </div>
                    </div>
                    <div class="robot-body">
                        <div class="robot-chest"></div>
                        <div class="robot-arm left"></div>
                        <div class="robot-arm right"></div>
                    </div>
                </div>
                <p class="robot-sidebar-label">Admin AI — Watching your panel 👀</p>
            </div>

            <a href="/" class="back-btn">← Return to Detector</a>
        </aside>

        <!-- Main Content -->
        <main class="admin-main animate-slide-up">
            <div class="admin-header">
                <h1>Admin Dashboard</h1>
                <p>System Overview & User Management</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-users">—</div>
                    <div class="stat-label">Registered Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #00e676;">V2</div>
                    <div class="stat-label">System Version</div>
                </div>
            </div>

            <div class="admin-panel-glass">
                <h3>👥 System Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-scans">...</div>
                        <div class="stat-label">Total AI Scans</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: #00e676;">ACTIVE</div>
                        <div class="stat-label">Engine Status</div>
                    </div>
                </div>
            </div>

            <div class="admin-panel-glass">
                <h3>👥 User Management</h3>
                <div id="users-table-wrapper">
                    <p style="color: #a09eb0; text-align:center; padding: 2rem;">Loading users...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'login.html'; return; }

            try {
                const res = await fetch('/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (!res.ok || data.role !== 'admin') { window.location.href = '/'; return; }
            } catch (err) {
                window.location.href = 'login.html'; return;
            }

            // Try to load users
            try {
                const res = await fetch('/auth/users', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const users = await res.json();
                    document.getElementById('stat-users').textContent = users.length;
                    
                    if (users.length === 0) {
                        document.getElementById('users-table-wrapper').innerHTML = '<p style="color: #a09eb0; text-align:center; padding: 2rem;">No users found in database.</p>';
                    } else {
                        const tableHtml = `<table style="width:100%;border-collapse:collapse;">
                            <thead><tr style="border-bottom:1px solid rgba(255,255,255,0.1)">
                                <th style="padding:1rem;text-align:left;color:#a09eb0;font-weight:500;">User Identity</th>
                                <th style="padding:1rem;text-align:left;color:#a09eb0;font-weight:500;">Email Access</th>
                                <th style="padding:1rem;text-align:left;color:#a09eb0;font-weight:500;">Clearance</th>
                                <th style="padding:1rem;text-align:left;color:#a09eb0;font-weight:500;">Verification</th>
                            </tr></thead><tbody>${users.map(u => `
                                <tr style="border-bottom:1px solid rgba(255,255,255,0.05); transition: background 0.3s; cursor: pointer;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                                    <td style="padding:1rem;color:#fff;">
                                        <div style="display:flex; align-items:center; gap:10px;">
                                            <div style="width:30px; height:30px; border-radius:50%; background:var(--accent-primary); display:flex; align-items:center; justify-content:center; font-size:0.8rem;">${u.username[0].toUpperCase()}</div>
                                            ${u.username}
                                        </div>
                                    </td>
                                    <td style="padding:1rem;color:#a09eb0;font-size:0.9rem;">${u.email || 'N/A'}</td>
                                    <td style="padding:1rem;">
                                        <span style="padding:0.3rem 1rem;border-radius:20px;font-size:0.75rem;font-weight:600;background:${u.role==='admin'?'rgba(188,19,254,0.2)':'rgba(0,230,118,0.1)'};color:${u.role==='admin'?'#bc13fe':'#00e676'};border:1px solid ${u.role==='admin'?'rgba(188,19,254,0.3)':'rgba(0,230,118,0.3)'}">${u.role.toUpperCase()}</span>
                                    </td>
                                    <td style="padding:1rem;">
                                        <span style="font-size:1.2rem;">${u.is_verified?'✅':'❌'}</span>
                                    </td>
                                </tr>`).join('')}
                            </tbody></table>`;
                        document.getElementById('users-table-wrapper').innerHTML = tableHtml;
                    }
                } else {
                    const errorData = await res.json();
                    document.getElementById('users-table-wrapper').innerHTML = `<p style="color:#ff1744;text-align:center;padding:2rem;">Error: ${errorData.detail || 'Access Denied'}</p>`;
                    document.getElementById('stat-users').textContent = 'ERR';
                }
            } catch (err) {
                document.getElementById('users-table-wrapper').innerHTML = `<p style="color:#ff1744;text-align:center;padding:2rem;">System Error: ${err.message}</p>`;
                document.getElementById('stat-users').textContent = 'FAILED';
            }

            // Load real-time forensic stats from backend
            try {
                const statsRes = await fetch('/auth/admin/stats', { headers: { 'Authorization': `Bearer ${token}` } });
                if (statsRes.ok) {
                    const stats = await statsRes.json();
                    document.getElementById('stat-users').textContent = stats.user_count;
                    document.getElementById('stat-scans').textContent = stats.scan_count;
                }
            } catch (err) {
                console.error("Failed to load forensic stats:", err);
            }

            // --- Mouse Cursor Tracking for Robot ---
            const robot = document.getElementById('admin-robot');
            const pupils = robot ? robot.querySelectorAll('.eye-pupil') : [];

            document.addEventListener('mousemove', (e) => {
                if (!robot || pupils.length === 0) return;
                const eyes = robot.querySelectorAll('.robot-eye');
                eyes.forEach((eye, i) => {
                    const eyeRect = eye.getBoundingClientRect();
                    const eyeCX = eyeRect.left + eyeRect.width / 2;
                    const eyeCY = eyeRect.top + eyeRect.height / 2;
                    const dx = e.clientX - eyeCX;
                    const dy = e.clientY - eyeCY;
                    const angle = Math.atan2(dy, dx);
                    const dist = Math.min(Math.hypot(dx, dy), 8); // max 8px movement
                    const px = Math.cos(angle) * dist;
                    const py = Math.sin(angle) * dist;
                    pupils[i].style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
                });
            });

            // Theme toggle
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const html = document.documentElement;
                    const currentTheme = html.getAttribute('data-theme') || 'dark';
                    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                    html.classList.add('theme-transition');
                    html.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                    setTimeout(() => html.classList.remove('theme-transition'), 500);
                });
            }
        });
    </script>
</body>

</html>
